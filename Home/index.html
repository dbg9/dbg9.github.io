<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 - Debug967</title>
    <!-- 引入fullPage.js库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: background-color 0.5s ease-in-out; /* 添加背景颜色过渡效果 */
        }

        #fullpage {
            width: 100%;
            height: 100vh;
        }

        .section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border: 5px solid #333; /* 添加图片框 */
            border-radius: 50%; /* 将图片裁剪成圆形 */
            overflow: hidden; /* 隐藏圆形图片外部部分 */
            margin-bottom: 20px;
            margin-left: 5px; /* 将头像往右移动 20px */
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 将文字颜色更改为深黑色 */
        h1,
        p,
        li {
            color: #000;
        }

        h1 {
            font-size: 36px;
            margin: 0; /* 调整标题的上下边距为0，取消默认的间距 */
            opacity: 0; /* 初始时设置标题为不可见 */
            transition: opacity 1s ease-in-out;
        }

        .section.active h1 {
            opacity: 1;
        }

        p {
            font-size: 20px;
            margin: 0; /* 调整段落的上下边距为0，取消默认的间距 */
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            font-size: 18px;
            margin: 0; /* 调整列表项的上下边距为0，取消默认的间距 */
        }

        /* 添加动画效果 */
        .animated {
            animation-duration: 1s;
            animation-fill-mode: both;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 自定义滚动条样式 */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="fullpage">
        <div class="section">
            <div class="profile-image animated">
                <img src="https://i0.hdslb.com/bfs/face/619751fe24428c01fe55cb6505dd3dc75047979c.jpg@240w_240h_1c_1s_!web-avatar-space-header.webp" alt="debug967">
            </div>
            <h1 class="animated">Debug967</h1>
            <p class="animated">初中生 个人开发者</p>
        </div>
        <div class="section">
            <h1 class="animated">个人简介</h1>
            <p class="animated">你好，我是Debug967，一名热爱编程和开发的初中生。我喜欢编写代码，探索新的技术，以及构建有趣的项目。我在各种编程语言和技术领域有一定经验，包括：</p>
            <ul>
                <li class="animated">Python</li>
                <li class="animated">HTML/CSS</li>
                <li class="animated">JavaScript</li>
                <li class="animated">C++</li>
                <li class="animated">...</li>
            </ul>
        </div>
        <!-- 联系方式部分 -->
        <div class="section">
            <h1 class="animated">联系方式</h1>
            <p class="animated">你可以通过以下方式联系我：</p>
            <ul>
                <li class="animated">Email 1: 1985409711@qq.com</li>
                <li class="animated">Email 2: debug967@qq.com</li>
                <li class="animated">BiliBili: <a href="https://space.bilibili.com/502594227" target="_blank">主页</a></li>
                <li class="animated">QQ: 1985409711</li>
            </ul>
        </div>
    </div>

    <!-- 引入fullPage.js库的JavaScript文件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.js"></script>
    <script>
        new fullpage('#fullpage', {
            anchors: ['section1', 'section2', 'section3'], // 设置锚点
            autoScrolling: true, // 启用自动滚动
            scrollHorizontally: true, // 启用水平滚动
        });

        // 添加动画触发
        fullpage_api.setAllowScrolling(true);

        fullpage_api.on('afterSlideLoad', function (section, origin, destination, direction) {
            const sectionId = section.getAttribute('id');
            const slideIndex = destination.index;
            const animatedElements = document.querySelectorAll(`#${sectionId} .animated`);
            
            animatedElements.forEach((element, index) => {
                setTimeout(() => {
                    element.classList.add('fadeInUp');
                }, index * 1000); // 添加延迟以实现逐个元素的动画
            });
        });
    </script>
</body>
</html>
