<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 - debug967</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .page-container {
            display: flex;
            width: 300%;
        }
        .page {
            width: 33.33%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .page.active {
            opacity: 1;
        }
        .page h1 {
            font-size: 36px;
            font-weight: bold;
        }
        .page p {
            font-size: 18px;
            line-height: 1.6;
        }
        .profile-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #333;
            transform: scale(0.8);
            transition: transform 0.5s ease-in-out;
        }
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-image:hover {
            transform: scale(1.0);
        }
        #page1 {
            background-color: #007bff;
            color: #fff;
        }
        #page2 {
            background-color: #333;
            color: #fff;
        }
        #page3 {
            background-color: #444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div id="page1" class="page active">
            <img class="profile-image" src="your-profile-image.jpg" alt="debug967">
            <h1>debug967</h1>
            <p>一名初中生个人开发者</p>
        </div>
        <div id="page2" class="page">
            <h1>个人简介</h1>
            <p>你好，我是debug967，一名热爱编程和开发的初中生。我喜欢编写代码，探索新的技术，以及构建有趣的项目。我在各种编程语言和技术领域有一定经验，包括：</p>
            <ul>
                <li>HTML/CSS</li>
                <li>JavaScript</li>
                <li>Python</li>
                <li>Web开发</li>
                <li>...</li>
            </ul>
            <p>我不仅对编程充满热情，还喜欢学习新知识，分享我的经验和项目。如果你对我的工作感兴趣，或者想合作开发项目，请随时与我联系。</p>
        </div>
        <div id="page3" class="page">
            <!-- 添加更多页面内容，根据需要 -->
        </div>
    </div>

    <!-- 使用JavaScript来实现吸附效果 -->
    <script>
        const pages = document.querySelectorAll('.page');
        const pageContainer = document.querySelector('.page-container');

        let currentPageIndex = 0;
        let scrolling = false;

        function showPage(index) {
            pages.forEach((page, pageIndex) => {
                if (pageIndex === index) {
                    page.classList.add('active');
                } else {
                    page.classList.remove('active');
                }
            });
        }

        function scrollToPage(index) {
            const pageWidth = window.innerWidth;
            pageContainer.style.transform = `translateX(-${index * pageWidth}px)`;
        }

        window.addEventListener('wheel', (e) => {
            if (!scrolling) {
                if (e.deltaY > 0 && currentPageIndex < pages.length - 1) {
                    currentPageIndex++;
                } else if (e.deltaY < 0 && currentPageIndex > 0) {
                    currentPageIndex--;
                }
                showPage(currentPageIndex);
                scrollToPage(currentPageIndex);
                scrolling = true;
                setTimeout(() => {
                    scrolling = false;
                }, 1000); // 防止滚动事件触发过快
            }
        });

        window.addEventListener('resize', () => {
            scrollToPage(currentPageIndex);
        });

        // 初始显示第一页
        showPage(currentPageIndex);
    </script>
</body>
</html>
